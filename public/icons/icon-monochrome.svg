<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Monocromático: una sola tinta (negro) para adaptive icons / status bar.
       El sistema (Safari, Android) aplicará el color que corresponda. -->
  <g fill="#000000">
    <!-- Contorno de apertura -->
    <path d="M 256 110 a 150 150 0 1 0 0.1 0 Z M 256 130 a 130 130 0 1 1 -0.1 0 Z" opacity="0.4"/>
    <!-- Silueta de cordillera -->
    <path d="M 116 320 L 171 230 L 211 270 L 246 200 L 286 240 L 331 190 L 386 270 L 396 320 Z"/>
    <!-- Sol / punto de lente -->
    <circle cx="336" cy="170" r="14"/>
  </g>
  <!-- Focus brackets -->
  <g stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M 110 110 L 110 140 M 110 110 L 140 110"/>
    <path d="M 402 110 L 402 140 M 402 110 L 372 110"/>
    <path d="M 110 402 L 110 372 M 110 402 L 140 402"/>
    <path d="M 402 402 L 402 372 M 402 402 L 372 402"/>
  </g>
</svg>
