<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d14"/>
      <stop offset="100%" stop-color="#2c3225"/>
    </linearGradient>
    <linearGradient id="ridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9d4a8"/>
      <stop offset="100%" stop-color="#7a8a4a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Aperture / mountain ridge composition -->
  <g transform="translate(256 260)">
    <!-- Outer aperture ring -->
    <circle r="150" fill="none" stroke="#5a6b3a" stroke-width="2" opacity="0.4"/>
    <!-- Mountain silhouette -->
    <path d="M -140 60 L -85 -30 L -45 10 L -10 -60 L 30 -20 L 75 -70 L 130 10 L 140 60 Z"
          fill="url(#ridge)"/>
    <!-- Peak highlights -->
    <path d="M -10 -60 L 10 -35 L 30 -20 Z" fill="#f2f0d5" opacity="0.55"/>
    <path d="M 75 -70 L 95 -40 L 115 -20 Z" fill="#f2f0d5" opacity="0.55"/>
    <!-- Sun / lens dot -->
    <circle cx="80" cy="-90" r="14" fill="#f2cb53"/>
    <circle cx="80" cy="-90" r="14" fill="none" stroke="#1a1d14" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Focus brackets -->
  <g stroke="#c9d4a8" stroke-width="4" fill="none" opacity="0.8" stroke-linecap="round">
    <path d="M 110 110 L 110 140 M 110 110 L 140 110"/>
    <path d="M 402 110 L 402 140 M 402 110 L 372 110"/>
    <path d="M 110 402 L 110 372 M 110 402 L 140 402"/>
    <path d="M 402 402 L 402 372 M 402 402 L 372 402"/>
  </g>
</svg>
